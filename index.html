<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Product Preview Card Component</title>
    <link rel="stylesheet" href="./style.css" />
</head>
<body>
    <div class="main">
    <div class="box">
        <div class="preview perfume"><img src="./Asset/Image/asset 1/image-product-desktop.jpg" alt="perfume" /></div>
        <div class="preview card">
            <h4 class="side">PERFUME</h4>
            <h1 class="side"><span>Gabrille</span><br /> <span>Essence Eau</span><br /> De Parfum</h1>
            <p class="side">A floral, solar and voluptuous interpretation composed by Olivier Polge, Perfume-Creator for the House of CHANEL</p>
            <p class="side"><span class="one">$149.99</span> <span class="two">$169.99</span></p>
            <div class="cart">
                <img src="./Asset/Image/asset 1/icon-cart.svg" alt="icon cart" />
                <h3>Add to Cart</h3>
            </div>
        </div>
    </div>
    </div>
</body>
</html>
